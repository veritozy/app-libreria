name: Construir y subir imagen Angular

on:
  push:
    branches:
      - master

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Construir Angular
        run: npm run build

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: docker build -t veritoz/app-libreria:latest .

      - name: Subir imagen Docker Hub
        run: docker push veritoz/app-libreria:latest

      - name: Actualizar contenedor Angular en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 184.73.135.241
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull veritoz/app-libreria:latest
            sudo docker stop app-angular || true
            sudo docker rm app-angular || true
            sudo docker run -d \
              --name app-angular \
              --network libreria-aws \
              -p 80:80 \
              veritoz/app-libreria:latest
